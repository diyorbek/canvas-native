name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build.yml

  github-release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*

  jsr-publish:
    name: Publish to JSR
    needs: github-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Set deno.json version from tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$TAG_VERSION" '.version = $v' deno.json > deno.json.tmp
          mv deno.json.tmp deno.json
          echo "Publishing version $TAG_VERSION"
      - name: Publish to JSR
        run: deno publish
